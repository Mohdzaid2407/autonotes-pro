{% extends 'base.html' %}

{% block content %}

<h2>Edit Note</h2>

<form method="POST">

    <label>Topic</label>
    <input type="text" name="topic" value="{{ note[2] }}">

    <label>Keywords</label>
    <input type="text" name="keywords" value="{{ note[3] }}">

    <label>Summary</label>
    <textarea name="summary" rows="6">{{ note[4] }}</textarea>

    <br><br>

    <button class="btn btn-primary">Save</button>

</form>

{% endblock %}
