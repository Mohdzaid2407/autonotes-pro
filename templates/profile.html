{% extends 'base.html' %}

{% block content %}
<div class="detail-wrapper">
    <div class="detail-card">
        <h1>User Profile</h1>
        <p><strong>Full Name:</strong> {{ user[1] }}</p>
        <p><strong>Email:</strong> {{ user[2] }}</p>
        <p><strong>Account Created:</strong> {{ user[3] }}</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>{{ total_notes }}</h3>
            <p>Total Notes Generated</p>
        </div>

        <div class="stat-card">
            <h3>Active</h3>
            <p>User Status</p>
        </div>

        <div class="stat-card">
            <h3>PDF</h3>
            <p>Export Available</p>
        </div>
    </div>

    <div class="card-actions">
        <a href="/dashboard" class="btn btn-secondary">Dashboard</a>
        <a href="/history" class="btn btn-primary">View History</a>
    </div>
</div>
{% endblock %}
