{% extends 'base.html' %}

{% block content %}
<div class="detail-wrapper">
    <div class="detail-card">
        <h1>{{ note[1] }}</h1>
        <p><strong>Topic:</strong> {{ note[2] }}</p>
        <p><strong>Keywords:</strong> {{ note[3] }}</p>
        <p><strong>Created At:</strong> {{ note[6] }}</p>
    </div>

    <div class="detail-card">
        <h2>Summary</h2>
        <p>{{ note[5] }}</p>
    </div>

    <div class="detail-card">
        <h2>Transcript</h2>
        <div class="transcript-box">
            <p>{{ note[4] }}</p>
        </div>
    </div>

    <div class="card-actions">
        <a href="/export-pdf/{{ note[0] }}" class="btn btn-primary">Download PDF</a>
        <a href="/delete-note/{{ note[0] }}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this note?')">Delete</a>
        <a href="/history" class="btn btn-secondary">Back</a>
    </div>
</div>
{% endblock %}
